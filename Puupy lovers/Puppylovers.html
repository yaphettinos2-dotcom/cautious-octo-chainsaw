<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puppy Lovers Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-header">
        <h1>Puppy lovers page</h1>
        <img src="banner-puppies.jpg" alt="Three puppies in a basket" class="banner-image">
    </header>

    <main>
        <section class="puppy-gallery">
            <div class="puppy-card">
                <img src="puppy-1.jpg" alt="White puppy">
            </div>

            <div class="missing-puppy">
                <p>Puppy<br>Missing<br>Here</p>
            </div>

            <div class="puppy-card">
                <img src="puppy-2.jpg" alt="Black and white puppy">
            </div>
        </section>

        <section class="more-puppies">
            <h2>More Puppies</h2>

            <div class="puppy-row">
                <div class="puppy-card">
                    <img src="puppy-3.jpg" alt="Cute puppy sitting outside">
                </div>

                <div class="puppy-card">
                    <img src="puppy-4.jpg" alt="Cute puppy looking at the camera">
                </div>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <p>designed by yaphet tinos</p>
    </footer>
</body>
</html>
